name: Release (Sharun)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: 1.0.0)"
        required: false
        type: string

      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            cmake \
            libudev-dev \
            libfuse2 \
            wget \
            protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10"
          modules: "qtshadertools qt5compat"
          cache: true

      - name: Symlink qsb to /usr/lib/qt6/bin (build.rs fallback search path)
        run: |
          sudo mkdir -p /usr/lib/qt6/bin
          sudo ln -sf "$QT_ROOT_DIR/bin/qsb" /usr/lib/qt6/bin/qsb

      - name: Build release binary
        run: cargo build --release -p omikuji

      - name: Package as AppImage
        run: |
          cd packaging
          chmod +x AppImage.sh
          ./AppImage.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AppImage
          path: "*.AppImage"
          archive: false

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: "*.AppImage"
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
